        dua: {
            title: "Dua dhe Salavate",
            arabic: "Dua<br>Fa’lem ennehu, “Lâ ilâhe il’lâllah (33) Muhammedun Resûlullâhi sal’lallâhu teâlâ alejhi ue sel’lem.<br><br>Eûdhu bil’lâhi minesh shejtânir raxhîm<br>Bismil’lâhir Rahmânir Rahîm<br>Innallâhe ue melâiketehû jusal’lûne alen nebijj, jâ ejjuhel ledhîne âmenû sal’lû alejhi ue sel’limû teslîmâ lebbejk.<br><br>Allâhumme sâl’li alâ sejjidinâ Muhammedin ue alâ âli sejjidinâ Muhammed. Bi adedi kul’li dâin ue deuâin ue bârik ue sel’lim alejhi ue alejhim kethîrâ;<br><br>Allâhumme sâl’li alâ sejjidinâ Muhammedin ue alâ âli sejjidinâ Muhammed. Bi adedi kul’li dâin ue deuâin ue bârik ue sel’lim alejhi ue alejhim kethîrâ;<br><br>Allâhumme sâl’li alâ sejjidinâ Muhammedin ue alâ âli sejjidinâ Muhammed. Bi adedi kul’li dâin ue deuâin ue bârik ue sel’lim alejhi ue alejhim kethîran kethîrâ.<br><br>Sal’li ue sel’lim jâ rabbi alâ habîbike Muhammedin ue alâ xhemîil enbijâi uel murselîn, ue alâ âli kul’lin ue sahbi kul’lin exhmeîn, âmîn, uel hamdu lil’lâhi Rabbil Âlemîn.<br><br>Elfu elfi salâtin ue elfu elfi selâmin alejke jâ rasûlallâh<br>Elfu elfi salâtin ue elfu elfi selâmin alejke jâ habîballâh<br>Elfu elfi sâlâtin ue elfu elfi selâmin alejke jâ emîne uahjil’lâh<br><br>Allahumme sal’li ue sel’lim ue bârik alâ sejjidinâ Muhammedin ue alâ âlihi ue as’hâbih, bi adedi eurâkil eshxhâr ue emuâxhil bihâr ue katarâtil emtâr, uâgfirlenâ uerhamnâ ueltuf binâ ue uâlidejnâ jâ ilâhenâ bi kul’li salâtin minhâ, eshhedu en lâ ilâhe il’lallâh ue eshhedu enne Muhammeden Rasûlullâhi sal’lallâhu teâlâ alejhi ue sel’lem.",
            albanian: "(Këtu bëhet duaja personale me duar të ngritura, pastaj thuhet:)<br>Dije se: Nuk ka zot tjetër përveç Allahut (lexohet 33 herë), Muhamedi është i Dërguari i Allahut, paqja dhe bekimi i Allahut qofshin mbi të.<br><br>Kërkoj mbrojtje tek Allahu nga shejtani i mallkuar. Me emrin e Allahut, Mëshiruesit, Mëshirëplotit.<br>Vërtet, Allahu dhe engjëjt e Tij dërgojnë salavate mbi Pejgamberin. O ju që keni besuar, dërgoni salavate mbi të dhe përshëndeteni me selam. (Të përgjigjemi o Zot).<br><br>O Allah, dërgo salavate mbi zotërinë tonë Muhamed dhe mbi familjen e tij. Sa numri i çdo sëmundjeje dhe ilaçi, dhe bekoi ata shumë.<br>O Allah, dërgo salavate mbi zotërinë tonë Muhamed dhe mbi familjen e tij. Sa numri i çdo sëmundjeje dhe ilaçi, dhe bekoi ata shumë.<br>O Allah, dërgo salavate mbi zotërinë tonë Muhamed dhe mbi familjen e tij. Sa numri i çdo sëmundjeje dhe ilaçi, dhe bekoi ata pafundësisht.<br><br>Dërgo salavate e selame o Zoti im mbi të dashurin Tënd Muhamed, mbi të gjithë pejgamberët e të dërguarit, mbi familjet e tyre dhe mbi të gjithë shokët e tyre. Amin. Falënderimi i takon Allahut, Zotit të botëve.<br><br>Një milion salavate dhe një milion selame qofshin mbi ty o i Dërguari i Allahut.<br>Një milion salavate dhe një milion selame qofshin mbi ty o i Dashuri i Allahut.<br>Një milion salavate dhe një milion selame qofshin mbi ty o Besniku i shpalljes së Allahut.<br><br>O Allah dërgo salavate, selame dhe bekime mbi zotërinë tonë Muhamed, mbi familjen dhe shokët e tij, sa numri i gjetheve të pemëve, dallgëve të detit dhe pikave të shiut. Na fal ne, na mëshiro, ji i butë me ne dhe prindërit tanë o Zoti ynë, për hir të secilit salavat prej tyre. Dëshmoj se nuk ka zot tjetër përveç Allahut dhe dëshmoj se Muhamedi është i Dërguari i Allahut, paqja dhe bekimi i Allahut qofshin mbi të."
        },
        ismiAzamSabahAksham: {
            title: "Ismi Azam",
            arabic: "Bismil’lâhi Rrahmâni Rrahîm<br>Subhaneke ja Allah tealejte ja Rrahman<br>exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Rrahîm teâlejte jâ Kerîm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Hamîd teâlejte jâ Hakîm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Mexhîd teâlejte jâ Melik, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Kuddûs teâlejte jâ Selâm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Mu’min teâlejte jâ Muhejmin, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Azîz teâlejte jâ Xhebbâr, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Mutekebbir teâlejte jâ Hâlik, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Euuel teâlejte jâ Âhir, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Dhâhir teâlejte jâ Bâtin, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Bâri teâlejte jâ Musâuuir, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Teuuâb teâlejte jâ Uehhâb, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Bâith teâlejte jâ Uârith, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Kadîm teâlejte jâ Mukîm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Ferd teâlejte jâ Uitr, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Nûr teâlejte jâ Settâr, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Xhelîl teâlejte jâ Xhemîl, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Kâhir teâlejte jâ Kâdir, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Melîk teâlejte jâ Muktedir, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Alîm teâlejte jâ Al’lâm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Adhîm teâlejte jâ Gafûr, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Halîm teâlejte jâ Uedûd, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Shehîd teâlejte jâ Shâhid, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Kebîr teâlejte jâ Mute’âl, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Nûr teâlejte jâ Latîf, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Semi‘ teâlejte jâ Kefîl, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Karîb teâlejte jâ Basîr, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Hakk teâlejte jâ Mubîn, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Raûf teâlejte jâ Rrahîm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Tâhir teâlejte jâ Mutahhir, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Muxhemmil teâlejte jâ Mufaddil, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Mudhhir teâlejte jâ Mun’im, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Dejjân teâlejte jâ Sultân, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Hannân teâlejte jâ Mennân, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Ehad teâlejte jâ Samed, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Hajj teâlejte jâ Kajjûm, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Adl teâlejte jâ Hakem, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke jâ Ferd teâlejte jâ Kuddûs, exhirnâ minen nâr bi afuike jâ Rrahmân<br>Subhâneke âhijjen sherâhijjen teâlejte lâ ilâhe il’lâ ente exhirnâ ue exhir uâlidejnâ ue rufekâenâ ue akribâenâ ue ahbâbenel mu’minînel muhlisîne minen nâr ue min kul’li nâr (duart poshtë) uahfadhnâ min sherrin nefsi uesh shejtân ue min sherril xhinni uel insân ue min sherril bid’ati ued dalâlâti uel ilhâdi uet tugjân (duart lart) bi afuike jâ Muxhîr, bi fadlike jâ Gaffâr, bi rahmetike jâ erhamer rrâhimîn. Allâhumme ed’hilnal Xhennete meal ebrâr, bi shefâati nebijjikel muhtâr. Amîn uel hamdu lil’lâhi Rabbil Âlemîn.",
            albanian: "Me emrin e Allahut, Mëshiruesit, Mëshirëplotit.<br>I Lartësuar je o Allah, i lartësuar je o Mëshirues.<br>Na ruaj nga zjarri me faljen Tënde o Mëshirues.<br>I Lartësuar je o Mëshirëplotë, i lartësuar je o Bujar...<br>I Lartësuar je o i Lavdishëm, i lartësuar je o i Urtë...<br>I Lartësuar je o i Madhërishëm, i lartësuar je o Sundimtar...<br>I Lartësuar je o i Shenjtë, i lartësuar je o Shpëtimtar...<br>I Lartësuar je o Besues, i lartësuar je o Mbikëqyrës...<br>I Lartësuar je o i Fuqishëm, i lartësuar je o Shtrëngues...<br>I Lartësuar je o Madhështor, i lartësuar je o Krijues...<br>I Lartësuar je o i Pari, i lartësuar je o i Fundit...<br>I Lartësuar je o i Dukshmi, i lartësuar je o i Fshehti...<br>I Lartësuar je o Fillues, i lartësuar je o Formësues...<br>I Lartësuar je o Pranues i pendimit, i lartësuar je o Dhurues...<br>I Lartësuar je o Ringjallës, i lartësuar je o Trashëgimtar...<br>I Lartësuar je o i Pashfillim, i lartësuar je o i Përhershëm...<br>I Lartësuar je o i Vetëm (Tek), i lartësuar je o Tek...<br>I Lartësuar je o Dritë, i lartësuar je o Mbulues i të metave...<br>I Lartësuar je o i Lartë, i lartësuar je o i Bukur...<br>I Lartësuar je o Mposhtës, i lartësuar je o i Mundshëm...<br>I Lartësuar je o Pronar, i lartësuar je o i Plotfuqishëm...<br>I Lartësuar je o i Dijshëm, i lartësuar je o i Gjithëdijshëm...<br>I Lartësuar je o Madhështor, i lartësuar je o Falës...<br>I Lartësuar je o i Butë, i lartësuar je o i Dashur...<br>I Lartësuar je o Dëshmues, i lartësuar je o Dëshmitar...<br>I Lartësuar je o i Madh, i lartësuar je o i Lartësuar...<br>I Lartësuar je o Dritë, i lartësuar je o i Kuptueshëm...<br>I Lartësuar je o Dëgjues, i lartësuar je o Dorëzanës...<br>I Lartësuar je o i Afërt, i lartësuar je o Shikues...<br>I Lartësuar je o i Vërtetë, i lartësuar je o Sqarues...<br>I Lartësuar je o i Dhembshur, i lartësuar je o Mëshirëplotë...<br>I Lartësuar je o i Pastër, i lartësuar je o Pastrues...<br>I Lartësuar je o Zbukurues, i lartësuar je o Dhurues i vlerave...<br>I Lartësuar je o Shfaqës, i lartësuar je o Begatues...<br>I Lartësuar je o Llogaritar, i lartësuar je o Sulltan...<br>I Lartësuar je o i Mëshirshëm, i lartësuar je o Dhurues...<br>I Lartësuar je o Një, i lartësuar je o Absolut (Samed)...<br>I Lartësuar je o i Gjallë, i lartësuar je o Mbajtës i jetës...<br>I Lartësuar je o i Drejtë, i lartësuar je o Gjykues...<br>I Lartësuar je o i Vetëm, i lartësuar je o i Shenjtë...<br><br>I lartësuar je o i Gjallë e Përjetshëm, nuk ka zot tjetër përveç Teje. Na ruaj ne, prindërit tanë, miqtë tanë, të afërmit tanë, dhe të dashurit tanë besimtarë të sinqertë nga zjarri dhe nga çdo zjarr. (kthe duart poshtë) Na ruaj nga e keqja e nefsit (epshit) dhe e shejtanit, nga e keqja e xhinëve dhe njerëzve, nga e keqja e bidatit (risive), humbjes, mohimit dhe devijimit. (kthe duart lart) Me faljen Tënde o Shpëtues, me mirësinë Tënde o Falës, me mëshirën Tënde o Mëshiruesi më i madh. O Allah, na fut në Xhenet bashkë me të mirët, me ndërmjetësimin e Pejgamberit Tënd të zgjedhur. Amin, falënderimi i takon Allahut, Zotit të botëve."
        },

            albanian: "Me emrin e Allahut, Mëshiruesit, Mëshirëplotit.<br>I Lartësuar je o Allah, i lartësuar je o Mëshirues.<br>Na ruaj nga zjarri me faljen Tënde o Mëshirues.<br>I Lartësuar je o Mëshirëplotë, i lartësuar je o Bujar...<br>I Lartësuar je o i Lavdishëm, i lartësuar je o i Urtë...<br>I Lartësuar je o i Madhërishëm, i lartësuar je o Sundimtar...<br>I Lartësuar je o i Shenjtë, i lartësuar je o Shpëtimtar...<br>I Lartësuar je o Besues, i lartësuar je o Mbikëqyrës...<br>I Lartësuar je o i Fuqishëm, i lartësuar je o Shtrëngues...<br>I Lartësuar je o Madhështor, i lartësuar je o Krijues...<br>I Lartësuar je o i Pari, i lartësuar je o i Fundit...<br>I Lartësuar je o i Dukshmi, i lartësuar je o i Fshehti...<br>I Lartësuar je o Fillues, i lartësuar je o Formësues...<br>I Lartësuar je o Pranues i pendimit, i lartësuar je o Dhurues...<br>I Lartësuar je o Ringjallës, i lartësuar je o Trashëgimtar...<br>I Lartësuar je o i Pashfillim, i lartësuar je o i Përhershëm...<br>I Lartësuar je o i Vetëm (Tek), i lartësuar je o Tek...<br>I Lartësuar je o Dritë, i lartësuar je o Mbulues i të metave...<br>I Lartësuar je o i Lartë, i lartësuar je o i Bukur...<br>I Lartësuar je o Mposhtës, i lartësuar je o i Mundshëm...<br>I Lartësuar je o Pronar, i lartësuar je o i Plotfuqishëm...<br>I Lartësuar je o i Dijshëm, i lartësuar je o i Gjithëdijshëm...<br>I Lartësuar je o Madhështor, i lartësuar je o Falës...<br>I Lartësuar je o i Butë, i lartësuar je o i Dashur...<br>I Lartësuar je o Dëshmues, i lartësuar je o Dëshmitar...<br>I Lartësuar je o i Madh, i lartësuar je o i Lartësuar...<br>I Lartësuar je o Dritë, i lartësuar je o i Kuptueshëm...<br>I Lartësuar je o Dëgjues, i lartësuar je o Dorëzanës...<br>I Lartësuar je o i Afërt, i lartësuar je o Shikues...<br>I Lartësuar je o i Vërtetë, i lartësuar je o Sqarues...<br>I Lartësuar je o i Dhembshur, i lartësuar je o Mëshirëplotë...<br>I Lartësuar je o i Pastër, i lartësuar je o Pastrues...<br>I Lartësuar je o Zbukurues, i lartësuar je o Dhurues i vlerave...<br>I Lartësuar je o Shfaqës, i lartësuar je o Begatues...<br>I Lartësuar je o Llogaritar, i lartësuar je o Sulltan...<br>I Lartësuar je o i Mëshirshëm, i lartësuar je o Dhurues...<br>I Lartësuar je o Një, i lartësuar je o Absolut (Samed)...<br>I Lartësuar je o i Gjallë, i lartësuar je o Mbajtës i jetës...<br>I Lartësuar je o i Drejtë, i lartësuar je o Gjykues...<br>I Lartësuar je o i Vetëm, i lartësuar je o i Shenjtë...<br><br>I lartësuar je o i Gjallë e Përjetshëm, nuk ka zot tjetër përveç Teje. Na ruaj ne, prindërit tanë, miqtë tanë, të afërmit tanë, dhe të dashurit tanë besimtarë të sinqertë nga zjarri dhe nga çdo zjarr. (kthe duart poshtë) Na ruaj nga e keqja e nefsit (epshit) dhe e shejtanit, nga e keqja e xhinëve dhe njerëzve, nga e keqja e bidatit (risive), humbjes, mohimit dhe devijimit. (kthe duart lart) Me faljen Tënde o Shpëtues, me mirësinë Tënde o Falës, me mëshirën Tënde o Mëshiruesi më i madh. O Allah, na fut në Xhenet bashkë me të mirët, me ndërmjetësimin e Pejgamberit Tënd të zgjedhur. Amin, falënderimi i takon Allahut, Zotit të botëve."
        },
        ismiAzamDrekaJacia: {
            title: "Ismi Azam",
            arabic: "Bismil’lâhi Rrahmâni Rrahîm<br>Ja Xhemilu ja Allah, ja Karibu ja Allah<br>jâ Muxhîbu jâ Allâh, jâ Habîbu jâ Allâh<br>jâ Raûfu jâ Allâh, jâ Atûfu jâ Allâh<br>jâ Ma’rûfu jâ Allâh, jâ Latîfu jâ Allâh<br>jâ Adhîmu jâ Allâh, jâ Hannânu jâ Allâh<br>jâ Mennânu jâ Allâh, jâ Dejjânu jâ Allâh<br>jâ Subhânu jâ Allâh, jâ Emânu jâ Allâh<br>jâ Burhânu jâ Allâh, jâ Sultânu jâ Allâh<br>jâ Muste’ânu jâ Allâh, jâ Muhsinu jâ Allâh<br>jâ Muteâlu jâ Allâh, jâ Rrahmânu jâ Allâh<br>jâ Rrahîmu jâ Allâh, jâ Kerîmu jâ Allâh<br>jâ Mexhîdu jâ Allâh, jâ Ferdu jâ Allâh<br>jâ Uitru jâ Allâh, jâ Ehadu jâ Allâh<br>jâ Samedu jâ Allâh, jâ Mahmûdu jâ Allâh<br>jâ Sadika’l ua’di jâ Allâh, jâ Alijju jâ Allâh<br>jâ Ganijju jâ Allâh, jâ Shâfî jâ Allâh<br>jâ Kâfî jâ Allâh, jâ Muâfî jâ Allâh<br>jâ Bâkî jâ Allâh, jâ Hâdî jâ Allâh<br>jâ Kâdiru jâ Allâh, jâ Sâtiru jâ Allâh<br>jâ Kahhâru jâ Allâh, jâ Xhebbâru jâ Allâh<br>jâ Gaffâru jâ Allâh, jâ Fettâhu jâ Allâh<br>Jâ rabbes semâuâti uel ardi jâ dhel xhelâli uel ikrâm. Es’eluke bi hakki hâdhihil esmâi kul’lihâ en tusâl’lije alâ sejjidinâ Muhammedin ue alâ âli Muhammed, uerham Muhammeden kemâ sal’lejte ue sel’lemte ue bârekte ue rahimte ue terahhamte alâ ibrâhîme ue alâ âli ibrâhîme fil alemîn. Rabbenâ inneke hamîdun mexhîd. Bi rahmetike jâ erhâmer rrâhimîn. Uel hamdu lil’lâhi rabbil âlemîn.",
            albanian: "Me emrin e Allahut, Mëshiruesit, Mëshirëplotit.<br>O i Bukur o Allah, o i Afërt o Allah,<br>O Përgjigjës o Allah, o i Dashur o Allah,<br>O i Dhembshur o Allah, o i Butë o Allah,<br>O i Njohur o Allah, o i Kuptueshëm o Allah,<br>O Madhështor o Allah, o i Mëshirshëm o Allah,<br>O Dhurues o Allah, o Llogaritar o Allah,<br>O i Lartësuar o Allah, o Sigurues o Allah,<br>O Argument o Allah, o Sulltan o Allah,<br>O Ndihmëtar o Allah, o Bamirës o Allah,<br>O i Lartë o Allah, o Mëshirues o Allah,<br>O Mëshirëplotë o Allah, o Bujar o Allah,<br>O i Lavdishëm o Allah, o i Vetëm (Tek) o Allah,<br>O Tek o Allah, o Një o Allah,<br>O Absolut o Allah, o i Lavdëruar o Allah,<br>O Mbajtës i premtimit o Allah, o i Lartë o Allah,<br>O i Pasur o Allah, o Shërues o Allah,<br>O Mjaftues o Allah, o Shpëtues o Allah,<br>O i Përhershëm o Allah, o Udhëzues o Allah,<br>O i Plotfuqishëm o Allah, o Mbulues (i të metave) o Allah,<br>O Mposhtës o Allah, o Shtrëngues o Allah,<br>O Falës o Allah, o Hapës (i mirësive) o Allah.<br><br>O Zoti i qiejve dhe i tokës, o Zot i Madhështisë dhe Nderimit. Të lutem me hakun (të drejtën) e të gjithë këtyre emrave të dërgosh salavate mbi zotërinë tonë Muhamed dhe mbi familjen e tij, dhe mëshiroje Muhamedin ashtu siç dërgove salavate, selame, bekime dhe mëshirë mbi Ibrahimin dhe familjen e Ibrahimit në të gjitha botët. Zoti ynë, Ti je i Lavdëruar dhe i Madhërishëm. Me mëshirën Tënde o Mëshiruesi më i madh. Falënderimi i takon Allahut, Zotit të botëve."
        },
        hashrSabah: {
            title: "Mbyllja: Sura Hashr 20-24",
            arabic: "Pastaj lexohen ajetet 20-24 te sures Hashr<br>(20.) La jesteuî  as-hâbu’n-nâri ue as-hâbu’l-xhenneh. As-hâbu’l-xhenneti humu’l-fâizûn (21.) Leu enzelnâ hâdhe’l-kur’ âne ‘alâ xhebelin le-raejtehu hâshi’an mutesaddi’an min hashjeti’l-lâhi ue tilke’l-emthâlu nedribuhâ linnâsi le’al’lehum jetefekkerûn (22.) Huuallâhu’l’ledhî lâ  ilâhe  il’lâ hu.‘âlimu’l-gajbi ue’shshehâdeti huue’r-rahmânu’r-rahîm (23.) Huuallâhu’l’ledhî lâ ilâhe il’lâhu, el-meliku’l-kuddûsu’s-selâmu’l-mu’uminu’l-muhejminu’l-’azîzu’l-xhebbâru’l-mutekebbir, subhânallâhi ‘ammâ jushrikûn (24.) Huuallâhu’lhâliku’l-bâri’ul-musau-uiru lehu’l-esmâu’l-husna, jusebbihu lehû mâ fis-semâuâti ue’l-erdi ue huue’l-’azîzu’l-hakîm.",
            albanian: "Nuk janë të barabartë banorët e Zjarrit me banorët e Xhenetit. Banorët e Xhenetit janë ata që kanë fituar (janë të shpëtuar). Sikur Ne ta zbrisnim këtë Kuran mbi ndonjë mal, ti do ta shihje atë të përulur dhe të copëtuar nga frika e Allahut. Këta janë shembujt që Ne ua sjellim njerëzve, në mënyrë që ata të mendojnë. Ai është Allahu, përveç të Cilit nuk ka zot tjetër. Ai është Njohësi i së fshehtës dhe i së dukshmes. Ai është Mëshiruesi, Mëshirëploti. Ai është Allahu, përveç të Cilit nuk ka zot tjetër; Sundimtari, i Shenjti, Paqedhënësi, Siguruesi, Mbikëqyrësi, i Plotfuqishmi, Shtrënguesi, Madhështori. I Lartësuar qoftë Allahu nga ajo që ia shoqërojnë (në adhurim)! Ai është Allahu, Krijuesi, Shpikësi, Formësuesi. Atij i përkasin emrat më të bukur. Atë e madhëron çfarëdo që gjendet në qiej dhe në tokë. Ai është i Plotfuqishmi, i Urti."
        },
        hashrAksham: {
            title: "Mbyllja: Sura Hashr 22-24",
            arabic: "Pastaj lexohen ajetet 22-24 te sures Hashr<br>(22.) Huuallâhu’l’ledhî lâ  ilâhe  il’lâ hu.‘âlimu’l-gajbi ue’shshehâdeti huue’r-rahmânu’r-rahîm (23.) Huuallâhu’l’ledhî lâ ilâhe il’lâhu, el-meliku’l-kuddûsu’s-selâmu’l-mu’uminu’l-muhejminu’l-’azîzu’l-xhebbâru’l-mutekebbir, subhânallâhi ‘ammâ jushrikûn (24.) Huuallâhu’lhâliku’l-bâri’ul-musau-uiru lehu’l-esmâu’l-husna, jusebbihu lehû mâ fis-semâuâti ue’l-erdi ue huue’l-’azîzu’l-hakîm.",
            albanian: "Ai është Allahu, përveç të Cilit nuk ka zot tjetër. Ai është Njohësi i së fshehtës dhe i së dukshmes. Ai është Mëshiruesi, Mëshirëploti. Ai është Allahu, përveç të Cilit nuk ka zot tjetër; Sundimtari, i Shenjti, Paqedhënësi, Siguruesi, Mbikëqyrësi, i Plotfuqishmi, Shtrënguesi, Madhështori. I Lartësuar qoftë Allahu nga ajo që ia shoqërojnë (në adhurim)! Ai është Allahu, Krijuesi, Shpikësi, Formësuesi. Atij i përkasin emrat më të bukur. Atë e madhëron çfarëdo që gjendet në qiej dhe në tokë. Ai është i Plotfuqishmi, i Urti."

        fethDreka: {
            title: "Mbyllja: Sura Fet'h 27-29",
            arabic: "Pastaj lexohen ajetet 27-29 te sures Fet’h<br>(27.) Lekad sadekallahu rasûlehu’r-rujâ bi’l-hakki le-tedhulunne’l-mesxhide’l-harâme inshâ-allâhu âminîne muhal’likine ruusekum ue mukassirîne lâ tehafûn, fe-’alime ma lem ta’lemu fexhe’ale min dûni dhâlike fet’han karîbê (28.) Huuel’ledhî ersele rasûlehu bi’l-hudâ ue dîni’l-hakki lijudhhirahu ‘ale’d-dîni kul’lihî ue kefâ bil’lâhi shehîdê (29.) Muhammedun rasulullâhi uel’ledhîne me’ahu eshiddâu‘ale’l-kuffâri, ruhamâ’u bejnehum terâhum rukke’an suxhxheden jebtegûne fadlen minallâhi ue riduâne, sîmâhum fi uuxhûhihim min etheri’s-suxhudi dhâlike metheluhum fi’t-teurâti ue metheluhum fi’l’inxhîli kezer’in ehraxhe shetehu, fe-êzerahu fastegledha festeuâ ‘alâ sûkihî ju’xhibu’z-zurrâ’a lijegîdhe bihimu’l-kuffâr, ue’adellahu’l’ledhîne âmenu ue ‘amilu’s– sâlihâti minhum magfireten ue exhran ‘adhîma.",
            albanian: "Allahu ia vërtetoi të Dërguarit të Tij ëndrrën me hak: Në dashtë Allahu, me siguri do të hyni në Xhaminë e Shenjtë (Qabe) të sigurt, me koka të rruara dhe flokë të shkurtuara, pa pasur frikë. Ai e dinte atë që ju nuk e dinit dhe përveç kësaj ju dha një fitore të afërt. Ai është Ai që e dërgoi të Dërguarin e Tij me udhëzim dhe fenë e vërtetë, për ta ngritur atë mbi të gjitha fetë. Dhe Allahu mjafton për dëshmitar. Muhamedi është i Dërguari i Allahut. Ata që janë me të, janë të ashpër ndaj mohuesve dhe të mëshirshëm mes veti. I sheh ata si përkulen dhe bien në sexhde duke kërkuar mirësinë e Allahut dhe kënaqësinë e Tij. Shenja e tyre në fytyrat e tyre është nga gjurma e sexhdes. Ky është shembulli i tyre në Teurat. Ndërsa shembulli i tyre në Inxhil është si një farë që nxjerr filizin e saj, pastaj e forcon atë, e ai trashet dhe qëndron drejt në kërcellin e tij, duke i gëzuar mbjellësit, në mënyrë që me ta të zemërojë mohuesve. Allahu u ka premtuar atyre prej tyre që besojnë dhe bëjnë vepra të mira, falje dhe shpërblim të madh."
        },
        nebeIkindia: {
            title: "Mbyllja: Sura Nebe 31-40",
            arabic: "Pastaj lexohen ajetet 31-40 te sures Nebe:<br>(31.) İnne li’l-muttekîne mefâzen (32.) Hadâika ue ‘anabâ (33.) Ue keuâ’ibe etrâbê (34.) Ue ke’sen dihâkâ (35.) La jesme’ûne fîhâ laguen ue lâ kidhdhâbê (36.) Xhezaen min rabbike  `atâen hisâbâ (37.) Rabbi’s-semâuâti ue’l-erdi ue mâ bejnehume’r-rahmâni lâ jemlikûne minhu hitâbâ (38.) Jeume jekûmu’r-rûhu ue’l-melâiketu saffe, lâ jetekellemûne illa men edhine lehu’r-rahmânu ue kâle sauâbâ (39.) Dhâlike’l-jeumul-hakk, fe-men shâe’t-tehadhe ilâ rabbihi me âbâ (40.) İnnâ  endhernâkum ‘adhâben karîbê, jeume jendhuru’l-meru mâ kaddemet jedâhu ue jekûlu’l-kâfiru ja lejtenî kuntu turâbê.",
            albanian: "Vërtet, për të devotshmit ka fitim (shpëtim). Kopshte dhe vreshta, dhe vajza të reja moshatare, dhe kupa të plota (me pije). Aty nuk do të dëgjojnë fjalë të kota as gënjeshtra. Shpërblim nga Zoti yt, dhuratë e llogaritur. Zoti i qiejve dhe i tokës dhe çfarë ka mes tyre, i Gjithëmëshirshmi; ata nuk do të mund t'i flasin Atij. Ditën kur Shpirti (Xhibrili) dhe engjëjt të qëndrojnë në rreshta, ata nuk do të flasin, përveç atij që i jep leje i Gjithëmëshirshmi dhe thotë të vërtetën. Ajo është Dita e vërtetë. Pra, kush të dojë le të zgjedhë rrugën e kthimit te Zoti i tij. Ne vërtet ju kemi paralajmëruar për një dënim të afërt, ditën kur njeriu do të shohë se çfarë kanë përgatitur duart e tij, dhe mohuesi do të thotë: \"Ah, sikur të isha pluhur!\""
        },
        amenerresuluJacia: {
            title: "Mbyllja: Bekare 285-286",
            arabic: "Pastaj lexohen dy ajetet e fundit te sures Bekare:<br>(285.) Âmene’r-resûlu bimâ  unzile  ilejhi min rabbihi ue’l-muminûn, kul’lun  âmene bil’lâhi ue melâiketihî ue kutubihî ue rusulih. Lâ nufer’riku bejne ehadim min rusulih. Ue kâlû semi’nâ ue et’anâ gufraneke rabbenâ ue ilejke’l-mesîr.  <br>(286.) Lâ jukel’lifullâhu nefsen ‘il’lâ uus’ahâ, Lehâ mâ kesebet ue ‘alejhê mektesebet. Rabbenâ lâ tuâhidhnâ in nesînâ eu ahta’nâ, rabbenâ ue lâ tahmil ‘alejnâ  isran kemâ hameltehû ‘ale’l’ledhîne min kablinâ. Rabbenâ ue lâ tuhammilnâ mâ lâ tâkate lenâ bih. Ua’fu ‘annâ, uag`fir lenâ, uerhamnâ ente meulâna fensurnâ ‘ale’l-kaumi’l-kâfirîn.",
            albanian: "I Dërguari ka besuar në atë që i është shpallur atij nga Zoti i tij, po ashtu edhe besimtarët. Të gjithë kanë besuar në Allahun, engjëjt e Tij, librat e Tij dhe të dërguarit e Tij (duke thënë): \"Ne nuk bëjmë dallim midis asnjërit prej të dërguarve të Tij.\" Dhe thanë: \"Dëgjuam dhe u bindëm. Faljen Tënde (kërkojmë) o Zoti ynë, dhe te Ti është kthimi.\" Allahu nuk e ngarkon askënd përtej mundësive të tij. Atij (njeriut) i takon ajo që ka fituar (nga e mira) dhe kundër tij është ajo që ka bërë (nga e keqja). \"Zoti ynë, mos na ndëshko nëse harrojmë ose gabojmë! Zoti ynë, mos na ngarko barrë të rëndë ashtu siç i ngarkove ata para nesh! Zoti ynë, mos na ngarko me diçka që nuk kemi fuqi ta mbajmë! Na fal, na mëshiro dhe na mëshiro! Ti je Mbrojtësi ynë, prandaj na ndihmo kundër popullit mohues!\""
        },
        pasSunetitAksham: {

ë Allahun”. Namazi është adhurim themelor por jo pak e rëndësishme është dhe përmendja e Allahut me gjuhë me fjalët “subhanallah”, “Allahu Ekber”. Nga ana psikologjike lutja konsiderohet një lidhje e veçantë mes individit dhe Zotit. Një namaz pa lutjet dhe tesbihet e fundit nuk është i mangët, por nëse ato kryhen ai do të ishte më i plotë.<br><br>Nëse analizojmë shumë ajete të Kur’anit dhe thënie të Profetit (a.s.), mund të kuptojmë shumë mirë faktin se njeriu duhet të shfrytëzojë sa më shumë kohë për të përkujtuar dhe falënderuar Allahun. Në Kur’anin Famëlartë përkujtimi i Allahut është vendosur mbi të gjitha adhurimet tjera. Nga ana tjetër në një ajet të sures “Zumer” thuhet se janë të humbur dhe të shthurur ata të cilët e kanë të ngurtësuar zemrën ndaj përmendjes së Allahut. Edhe në hadithe është theksuar se vepra më e mirë është përmendja e Allahut. Nën dritën e gjithë këtyre fakteve e kuptojmë se përmendja e Allahut para apo pas namazit, dhikri, bërja e duasë janë të domosdoshme për krijimin e një adhuruesi të sinqertë dhe modest. Ata të cilët nuk i zbukurojnë namazet apo adhurimet e tjera me lutje, adhurime shtesë, dhikër dhe tesbihë nuk mund të shijojnë plotësisht ëmbëlsinë e besimit.”<br><br>Përmendja e Allahut pas dhënies selam, bërja e lutjeve të mësuara nga ana e Profetit (a.s.) dhe kërkimi i faljes nga Zoti është sunet. Profeti ynë (a.s.) lexonte lutje të ndryshme menjëherë pas selamit. Disa prej këtyre lutjeve i ka lexuar menjëherë pas namazeve farz e disa të tjera edhe pas farzit edhe pas nafileve. Duke parë lutjet e bëra pas namazeve farz shumë dijetarë myslimanë kanë pohuar se bërja e lutjeve pas namazeve farz është më e përshtatshme se bërja e lutjeve pas namazeve nafile. Krahas kësaj edhe vlera e Ajetit Kursi të lexuar pas namazit është shumë e madhe.",

    let currentPrayer = "Sabahu";

    let targetCount = 33;

    function renderTabs() {
        const nav = document.getElementById('bottom-tabs');
        nav.innerHTML = Object.keys(appData).map(prayer => `
            <button onclick="setPrayer('${prayer}')" 
                class="tab-btn flex flex-col items-center justify-center w-full min-w-[70px] py-2 px-1 rounded-xl focus:outline-none select-none
                ${currentPrayer === prayer ? 'text-emerald-600 dark:text-emerald-400 font-bold bg-emerald-50 dark:bg-emerald-900/30' : 'text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-400'}">
                <div class="mb-1">${appData[prayer].icon}</div>
                <span class="text-[10px] uppercase tracking-wider">${prayer}</span>
            </button>
        `).join('');
    }

    function renderContent() {
        const main = document.getElementById('content');
        let html = '';
        const sequence = appData[currentPrayer].sequence;
        
        sequence.forEach((item, index) => {
            html += `
                <div id="card-${index}" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-6 scroll-mt-24 transition-all duration-300">
                    <div class="bg-emerald-50/50 dark:bg-gray-800/80 px-4 py-3 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center sticky top-0 z-10 backdrop-blur-sm">
                        <h2 class="text-emerald-700 dark:text-emerald-400 font-bold text-sm tracking-wide uppercase">
                            ${item.title}
                        </h2>
                    </div>
                    <div class="p-5">
                        ${item.isHtml ? item.arabic : `<p class="arabic-text text-gray-800 dark:text-gray-200">${item.arabic}</p>`}
                        
                        ${item.albanian ? `
                            <div class="mt-5 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl p-4 border border-emerald-100 dark:border-emerald-800/50">

                                    ${item.albanian}
                                </p>
                            </div>
                        ` : ''}

                        ${index < sequence.length - 1 ? `
                        <button onclick="scrollToNext(${index + 1})" class="mt-6 w-full bg-gray-50 hover:bg-emerald-50 dark:bg-gray-700 dark:hover:bg-gray-600 border border-gray-200 dark:border-gray-600 text-gray-600 hover:text-emerald-600 dark:text-gray-300 dark:hover:text-emerald-400 py-3 rounded-xl font-bold flex items-center justify-center space-x-2 transition-all active:scale-[0.98]">

                        </button>
                        ` : ''}
                    </div>
                </div>
            `;
        });
        
        html += `<div class="h-20 flex items-center justify-center text-gray-400 text-sm font-medium">Fundi i lutjeve</div>`;
        main.innerHTML = html;
    }

    function scrollToNext(index) {
        const nextElement = document.getElementById(`card-${index}`);
        if (nextElement) {
            nextElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            if (window.navigator && window.navigator.vibrate) navigator.vibrate(20);
            
            // Add a subtle highlight effect to the next card
            nextElement.style.boxShadow = '0 0 0 2px #10b981'; // emerald-500
            setTimeout(() => {
                nextElement.style.boxShadow = '';
            }, 800);
        }
    }

    function setPrayer(prayer) {
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(30);
        currentPrayer = prayer;
        renderTabs();
        renderContent();
        document.getElementById('content').scrollTo({ top: 0, behavior: 'instant' });
    }

    // --- COUNTER LOGIC ---
    function openCounter(title) {
        document.getElementById('counter-title').innerText = title;
        document.getElementById('counter-value').innerText = "0";
        currentCounter = 0;
        counterActive = true;
        
        const overlay = document.getElementById('counter-overlay');
        overlay.classList.remove('hidden');
        overlay.classList.add('flex');
        
        // Prevent body scrolling
        document.body.style.overflow = 'hidden';
    }

    function incrementCounter() {
        if (!counterActive) return;
        
        currentCounter++;
        const valElement = document.getElementById('counter-value');
        valElement.innerText = currentCounter;
        
        // Visual pop
        valElement.style.transform = 'scale(1.15)';
        setTimeout(() => { valElement.style.transform = 'scale(1)'; }, 100);

        if (window.navigator && window.navigator.vibrate) {
            if (currentCounter === targetCount) {
                // Long vibration when target reached
                navigator.vibrate([200, 50, 200]); 
            } else if (currentCounter > targetCount) {
                 navigator.vibrate(50);
            } else {
                // Short subtle vibration for normal taps
                navigator.vibrate(30);
            }
        }
        
        if (currentCounter >= targetCount) {
            valElement.classList.remove('text-emerald-400');
            valElement.classList.add('text-green-300');
        } else {
            valElement.classList.add('text-emerald-400');
            valElement.classList.remove('text-green-300');
        }
    }

    function closeCounter() {
        counterActive = false;
        const overlay = document.getElementById('counter-overlay');
        overlay.classList.add('hidden');
        overlay.classList.remove('flex');
        
        // Restore body scrolling
        document.body.style.overflow = '';
    }

    // Apply default font size on load
    rootStyle.setProperty('--base-font-size', `${currentFontSize}px`);
    // Initialize App
    renderTabs();
    renderContent();
</script>
</body>
</html>
